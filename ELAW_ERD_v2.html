<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ELAW DB ERD v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f8fafc;overflow:hidden}
#wrap{width:100vw;height:100vh;position:relative;overflow:hidden;cursor:grab;user-select:none}
#wrap.grabbing{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
svg#lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.tbl{position:absolute;border-radius:10px;border:1.5px solid #E5E7EB;background:#ffffff;min-width:200px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.tbl-head{padding:7px 11px;border-radius:8px 8px 0 0;font-weight:500;font-size:12.5px;display:flex;align-items:center;gap:6px;cursor:move}
.tbl-head .ico{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.tbl-body{border-top:1px solid #F3F4F6}
.col{display:flex;align-items:center;padding:3px 10px;gap:5px;border-bottom:1px solid #F3F4F6;min-height:22px}
.col:last-child{border-bottom:none}
.col .cn{flex:1;font-size:11px;color:#111827}
.col .ct{font-size:10px;color:#9CA3AF;white-space:nowrap}
.tag{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600;flex-shrink:0;letter-spacing:.2px}
.pk{background:#DBEAFE;color:#1E3A8A}
.fk{background:#FEF3C7;color:#78350F}
.uq{background:#D1FAE5;color:#064E3B}
.null{background:#F3F4F6;color:#6B7280}
.controls{position:fixed;top:14px;right:14px;display:flex;gap:5px;z-index:100}
.btn{background:#ffffff;border:1px solid #D1D5DB;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;color:#374151;font-family:Arial}
.btn:hover{background:#F9FAFB}
.legend{position:fixed;bottom:12px;left:12px;display:flex;flex-wrap:wrap;gap:8px;background:#ffffff;border:1px solid #E5E7EB;border-radius:8px;padding:6px 12px;font-size:10px;color:#6B7280;z-index:100}
.li{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:2px}
.hint{position:fixed;top:14px;left:14px;font-size:10px;color:#9CA3AF;background:#ffffff;border:1px solid #E5E7EB;border-radius:5px;padding:3px 8px;z-index:100}
.title{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:#1E3A5F;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;padding:4px 14px;z-index:100}
</style>
</head>
<body>
<div class="title">ELAW DB ERD v2 — 12개 테이블 전체</div>
<div class="controls">
  <button class="btn" onclick="zoom(1.15)">＋</button>
  <button class="btn" onclick="zoom(0.87)">－</button>
  <button class="btn" onclick="resetView()">초기화</button>
</div>
<div class="hint">드래그 이동 · 테이블 헤더 끌어서 이동 · 휠 줌</div>
<div class="legend">
  <div class="li"><div class="dot" style="background:#DBEAFE;border:1px solid #93C5FD"></div>PK</div>
  <div class="li"><div class="dot" style="background:#FEF3C7;border:1px solid #FCD34D"></div>FK</div>
  <div class="li"><div class="dot" style="background:#D1FAE5;border:1px solid #6EE7B7"></div>UQ</div>
  <div class="li"><div class="dot" style="background:#F3F4F6;border:1px solid #D1D5DB"></div>NULL</div>
  <div class="li"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5 3"/></svg>1:1</div>
  <div class="li"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#F97316" stroke-width="1.5"/></svg>1:N CASCADE</div>
  <div class="li"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3 3"/></svg>RESTRICT</div>
  <div class="li"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="8 2"/></svg>SET NULL</div>
</div>
<div id="wrap">
  <div id="canvas"><svg id="lines"></svg></div>
</div>
<script>
const T = {
  users:{color:"#1D4ED8",bg:"#EFF6FF",x:370,y:10,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"email",t:"VARCHAR(255)",tags:["uq"]},
    {n:"password_hash",t:"VARCHAR(255)",tags:[]},
    {n:"name",t:"VARCHAR(100)",tags:[]},
    {n:"role",t:"ENUM(student|company|admin)",tags:[]},
    {n:"phone",t:"VARCHAR(20)",tags:["null"]},
    {n:"is_active",t:"TINYINT(1)",tags:[]},
    {n:"ai_consent",t:"TINYINT(1)",tags:[]},
    {n:"privacy_consent",t:"TINYINT(1)",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  companies:{color:"#0F766E",bg:"#F0FDFA",x:680,y:10,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk","uq"]},
    {n:"name",t:"VARCHAR(200)",tags:[]},
    {n:"industry",t:"VARCHAR(100)",tags:["null"]},
    {n:"description",t:"TEXT",tags:["null"]},
    {n:"logo_url",t:"VARCHAR(500)",tags:["null"]},
    {n:"website_url",t:"VARCHAR(500)",tags:["null"]},
    {n:"is_approved",t:"TINYINT(1)",tags:[]},
    {n:"approved_at",t:"DATETIME",tags:["null"]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  platform_links:{color:"#6D28D9",bg:"#F5F3FF",x:50,y:10,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"platform",t:"ENUM(baekjoon|github|programmers)",tags:[]},
    {n:"external_id",t:"VARCHAR(200)",tags:[]},
    {n:"access_token",t:"VARCHAR(500)",tags:["null"]},
    {n:"token_expires",t:"DATETIME",tags:["null"]},
    {n:"last_synced",t:"DATETIME",tags:["null"]},
    {n:"is_active",t:"TINYINT(1)",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  user_goals:{color:"#1D4ED8",bg:"#EFF6FF",x:50,y:280,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"goal_type",t:"ENUM(study|job)",tags:[]},
    {n:"field",t:"VARCHAR(100)",tags:["null"]},
    {n:"job_role",t:"VARCHAR(100)",tags:["null"]},
    {n:"start_date",t:"DATE",tags:["null"]},
    {n:"end_date",t:"DATE",tags:["null"]},
    {n:"mid_eval_date",t:"DATE",tags:["null"]},
    {n:"duration_weeks",t:"TINYINT UNSIGNED",tags:["null"]},
    {n:"is_active",t:"TINYINT(1)",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  curricula:{color:"#1D4ED8",bg:"#EFF6FF",x:50,y:580,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"goal_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"content_json",t:"JSON",tags:[]},
    {n:"version",t:"TINYINT UNSIGNED",tags:[]},
    {n:"is_active",t:"TINYINT(1)",tags:[]},
    {n:"generated_at",t:"DATETIME",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
  ]},
  solve_history:{color:"#B45309",bg:"#FFFBEB",x:370,y:270,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"platform",t:"ENUM(baekjoon|programmers|w3schools|custom)",tags:[]},
    {n:"problem_id",t:"VARCHAR(50)",tags:[]},
    {n:"problem_title",t:"VARCHAR(300)",tags:["null"]},
    {n:"status",t:"ENUM(solved|failed|partial)",tags:[]},
    {n:"language",t:"VARCHAR(50)",tags:["null"]},
    {n:"algo_tags",t:"JSON",tags:["null"]},
    {n:"difficulty",t:"VARCHAR(30)",tags:["null"]},
    {n:"time_spent_min",t:"SMALLINT UNSIGNED",tags:["null"]},
    {n:"solved_at",t:"DATETIME",tags:[]},
    {n:"source",t:"ENUM(api|crawl|manual)",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
  ]},
  learning_stats:{color:"#B45309",bg:"#FFFBEB",x:370,y:600,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"stat_type",t:"ENUM(language|algo_tag)",tags:[]},
    {n:"stat_key",t:"VARCHAR(100)",tags:[]},
    {n:"total_count",t:"INT UNSIGNED",tags:[]},
    {n:"solved_count",t:"INT UNSIGNED",tags:[]},
    {n:"failed_count",t:"INT UNSIGNED",tags:[]},
    {n:"correct_rate",t:"FLOAT",tags:["null"]},
    {n:"last_solved_at",t:"DATETIME",tags:["null"]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  portfolios:{color:"#9D174D",bg:"#FDF2F8",x:680,y:280,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"title",t:"VARCHAR(300)",tags:["null"]},
    {n:"summary_text",t:"TEXT",tags:["null"]},
    {n:"content_json",t:"JSON",tags:["null"]},
    {n:"public_slug",t:"VARCHAR(120)",tags:["uq","null"]},
    {n:"pdf_path",t:"VARCHAR(500)",tags:["null"]},
    {n:"language",t:"ENUM(ko|en)",tags:[]},
    {n:"version",t:"TINYINT UNSIGNED",tags:[]},
    {n:"is_public",t:"TINYINT(1)",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  job_postings:{color:"#0F766E",bg:"#F0FDFA",x:680,y:580,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"company_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"title",t:"VARCHAR(300)",tags:[]},
    {n:"description",t:"TEXT",tags:["null"]},
    {n:"required_skills",t:"JSON",tags:["null"]},
    {n:"preferred_skills",t:"JSON",tags:["null"]},
    {n:"job_role",t:"VARCHAR(100)",tags:["null"]},
    {n:"career_level",t:"ENUM(new|junior|senior|any)",tags:[]},
    {n:"deadline",t:"DATE",tags:["null"]},
    {n:"is_active",t:"TINYINT(1)",tags:[]},
    {n:"view_count",t:"INT UNSIGNED",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  matches:{color:"#B91C1C",bg:"#FEF2F2",x:680,y:890,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"posting_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"match_score",t:"FLOAT",tags:["null"]},
    {n:"status",t:"ENUM(recommended|viewed|scrapped|applied|rejected)",tags:[]},
    {n:"applied_at",t:"DATETIME",tags:["null"]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  posts:{color:"#374151",bg:"#F9FAFB",x:50,y:880,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"author_id",t:"BIGINT UNSIGNED",tags:["fk"]},
    {n:"category",t:"ENUM(notice|contest|event)",tags:[]},
    {n:"title",t:"VARCHAR(300)",tags:[]},
    {n:"content",t:"TEXT",tags:[]},
    {n:"is_pinned",t:"TINYINT(1)",tags:[]},
    {n:"view_count",t:"INT UNSIGNED",tags:[]},
    {n:"created_at",t:"DATETIME",tags:[]},
    {n:"updated_at",t:"DATETIME",tags:[]},
  ]},
  ai_logs:{color:"#374151",bg:"#F9FAFB",x:370,y:920,cols:[
    {n:"id",t:"BIGINT UNSIGNED",tags:["pk"]},
    {n:"user_id",t:"BIGINT UNSIGNED",tags:["fk","null"]},
    {n:"feature",t:"ENUM(curriculum|weakness|recommendation|portfolio|matching|problem_gen)",tags:[]},
    {n:"prompt_tokens",t:"INT UNSIGNED",tags:["null"]},
    {n:"output_tokens",t:"INT UNSIGNED",tags:["null"]},
    {n:"latency_ms",t:"INT UNSIGNED",tags:["null"]},
    {n:"status",t:"ENUM(success|error|timeout|cached)",tags:[]},
    {n:"error_message",t:"VARCHAR(500)",tags:["null"]},
    {n:"created_at",t:"DATETIME",tags:[]},
  ]},
};

const RELS = [
  ["companies","user_id","users","id","1:1","CASCADE"],
  ["platform_links","user_id","users","id","N:1","CASCADE"],
  ["user_goals","user_id","users","id","N:1","CASCADE"],
  ["curricula","goal_id","user_goals","id","N:1","CASCADE"],
  ["curricula","user_id","users","id","N:1","CASCADE"],
  ["solve_history","user_id","users","id","N:1","CASCADE"],
  ["learning_stats","user_id","users","id","N:1","CASCADE"],
  ["portfolios","user_id","users","id","N:1","CASCADE"],
  ["job_postings","company_id","companies","id","N:1","CASCADE"],
  ["matches","user_id","users","id","N:1","CASCADE"],
  ["matches","posting_id","job_postings","id","N:1","CASCADE"],
  ["posts","author_id","users","id","N:1","RESTRICT"],
  ["ai_logs","user_id","users","id","N:1","SET_NULL"],
];

const wrap=document.getElementById("wrap"),canvas=document.getElementById("canvas"),svg=document.getElementById("lines");
let scale=1,tx=0,ty=0,pan=false,px,py,ptx,pty;
const els={};

for(const [key,tbl] of Object.entries(T)){
  const d=document.createElement("div"); d.className="tbl"; d.id="t-"+key;
  d.style.left=tbl.x+"px"; d.style.top=tbl.y+"px";
  const head=document.createElement("div"); head.className="tbl-head";
  head.style.cssText=`background:${tbl.bg};color:${tbl.color};border-bottom:2px solid ${tbl.color}33`;
  head.innerHTML=`<span class="ico" style="background:${tbl.color}"></span><strong>${key}</strong>`;
  const body=document.createElement("div"); body.className="tbl-body";
  for(const c of tbl.cols){
    const row=document.createElement("div"); row.className="col";
    const tags=c.tags.map(t=>`<span class="tag ${t}">${t.toUpperCase()}</span>`).join("");
    row.innerHTML=`${tags}<span class="cn">${c.n}</span><span class="ct">${c.t}</span>`;
    body.appendChild(row);
  }
  d.appendChild(head); d.appendChild(body);
  let dg=false,ddx,ddy;
  head.addEventListener("mousedown",e=>{dg=true;ddx=e.clientX-tbl.x*scale;ddy=e.clientY-tbl.y*scale;e.stopPropagation();});
  document.addEventListener("mousemove",e=>{if(!dg)return;tbl.x=(e.clientX-ddx)/scale;tbl.y=(e.clientY-ddy)/scale;d.style.left=tbl.x+"px";d.style.top=tbl.y+"px";draw();});
  document.addEventListener("mouseup",()=>dg=false);
  canvas.appendChild(d); els[key]=d;
}

function getBox(k){const t=T[k],el=els[k];return{x:t.x,y:t.y,w:el.offsetWidth,h:el.offsetHeight,cx:t.x+el.offsetWidth/2,cy:t.y+el.offsetHeight/2};}

function draw(){
  svg.innerHTML=""; svg.setAttribute("width","3000"); svg.setAttribute("height","3000");
  for(const [from,fc,to,tc,card,del] of RELS){
    const f=getBox(from),t2=getBox(to);
    const dx=t2.cx-f.cx,dy=t2.cy-f.cy;
    let x1,y1,x2,y2;
    if(Math.abs(dx)>Math.abs(dy)){x1=dx>0?f.x+f.w:f.x;x2=dx>0?t2.x:t2.x+t2.w;y1=f.y+Math.min(f.h*.35,28);y2=t2.y+Math.min(t2.h*.35,28);}
    else{y1=dy>0?f.y+f.h:f.y;y2=dy>0?t2.y:t2.y+t2.h;x1=f.x+f.w*.5;x2=t2.x+t2.w*.5;}
    const color=card==="1:1"?"#3B82F6":del==="RESTRICT"?"#EF4444":del==="SET_NULL"?"#8B5CF6":"#F97316";
    const dash=card==="1:1"?"6 3":del==="RESTRICT"?"3 3":del==="SET_NULL"?"9 3":"none";
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    let cx1,cy1,cx2,cy2;
    if(Math.abs(dx)>Math.abs(dy)){cx1=mx;cy1=y1;cx2=mx;cy2=y2;}else{cx1=x1;cy1=my;cx2=x2;cy2=my;}
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
    p.setAttribute("fill","none"); p.setAttribute("stroke",color); p.setAttribute("stroke-width","1.5"); p.setAttribute("opacity","0.75");
    if(dash!=="none")p.setAttribute("stroke-dasharray",dash);
    svg.appendChild(p);
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",x2);c.setAttribute("cy",y2);c.setAttribute("r","3.5");c.setAttribute("fill",color);c.setAttribute("opacity","0.85");
    svg.appendChild(c);
    if(del==="RESTRICT"||del==="SET_NULL"){
      const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",(x1+x2)/2+4);lbl.setAttribute("y",(y1+y2)/2-4);
      lbl.setAttribute("font-size","9");lbl.setAttribute("fill",color);lbl.setAttribute("font-family","Arial");lbl.setAttribute("opacity","0.85");
      lbl.textContent=del==="RESTRICT"?"RESTRICT":"SET NULL";
      svg.appendChild(lbl);
    }
  }
}

wrap.addEventListener("mousedown",e=>{if(e.target.closest(".tbl-head"))return;pan=true;px=e.clientX;py=e.clientY;ptx=tx;pty=ty;wrap.classList.add("grabbing");});
document.addEventListener("mousemove",e=>{if(!pan)return;tx=ptx+(e.clientX-px);ty=pty+(e.clientY-py);apply();});
document.addEventListener("mouseup",()=>{pan=false;wrap.classList.remove("grabbing");});
wrap.addEventListener("wheel",e=>{e.preventDefault();const f=e.deltaY>0?.9:1.1;const r=wrap.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;scale*=f;apply();},{passive:false});

function apply(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;draw();}
function zoom(f){const cx=wrap.offsetWidth/2,cy=wrap.offsetHeight/2;tx=cx-(cx-tx)*f;ty=cy-(cy-ty)*f;scale*=f;apply();}
function resetView(){scale=0.62;tx=8;ty=8;apply();}
setTimeout(()=>{resetView();draw();},60);
</script>
</body>
</html>
