version: '3.8'

services:
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    env_file:
      - .env
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:9000
    depends_on:
      - backend
